services:
  db:
    image: postgres:15-alpine
    container_name: libops_db_prod
    environment:
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set for production}
      POSTGRES_DB: ${DB_NAME:-libops}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - libops_prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-libops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    image: ${DOCKER_IMAGE_BACKEND:-myorg/libops-backend}:latest
    container_name: libops_backend_prod
    environment:
      - APP_NAME=LibOps
      - APP_VERSION=0.1.0
      - DEBUG=false
      - DATABASE_URL=postgresql+psycopg://${DB_USER:-appuser}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/${DB_NAME:-libops}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - libops_prod_net
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: always

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-myorg/libops-frontend}:latest
    container_name: libops_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - libops_prod_net
    restart: always

networks:
  libops_prod_net:
    driver: bridge

volumes:
  postgres_prod_data:
