services:
  db:
    image: postgres:15-alpine
    container_name: libops_db
    environment:
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: ${DB_NAME:-libops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - libops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-libops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: libops_backend
    environment:
      - APP_NAME=LibOps
      - APP_VERSION=0.1.0
      - DEBUG=true
      # Use docker DNS name 'db' instead of 'localhost'
      - DATABASE_URL=postgresql+psycopg://${DB_USER:-appuser}:${DB_PASSWORD:-changeme_dev_only}@db:5432/${DB_NAME:-libops}
      - SECRET_KEY=${SECRET_KEY:-dev-only-insecure-key-do-not-use-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - libops_net
    # Automatically run migrations on startup before starting Uvicorn
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: libops_frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - libops_net

networks:
  libops_net:
    driver: bridge

volumes:
  postgres_data:
