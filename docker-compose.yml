services:
  db:
    image: postgres:15-alpine
    container_name: libops_db
    environment:
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: ${DB_NAME:-libops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - libops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-libops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: libops_backend
    environment:
      - APP_NAME=LibOps
      - APP_VERSION=0.1.0
      - DEBUG=true
      # Use docker DNS name 'db' instead of 'localhost'
      - DATABASE_URL=postgresql+psycopg://${DB_USER:-appuser}:${DB_PASSWORD:-changeme_dev_only}@db:5432/${DB_NAME:-libops}
      - SECRET_KEY=${SECRET_KEY:-dev-only-insecure-key-do-not-use-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - S3_BUCKET=${S3_BUCKET}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - libops_net
    # Automatically run migrations on startup before starting Uvicorn
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: libops_frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - libops_net

  jenkins:
    build:
      context: ./jenkins
    container_name: libops_jenkins
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - libops_net

  sonarqube:
    image: sonarqube:community
    container_name: libops_sonarqube
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonarqube
      - SONAR_JDBC_PASSWORD=sonar123
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - libops_net

networks:
  libops_net:
    driver: bridge

volumes:
  postgres_data:
  jenkins_home:
    external: true
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
